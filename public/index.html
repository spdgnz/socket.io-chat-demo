<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="./styles.css">
</head>
<body>
<div class="page">
<div class="container-fluid">
    <div class="row">

        <div class="namespaces">
            <!-- populated from the socket server -->
        </div>

        <div class="rooms">
            <div class="main-rooms">
                <h4 class="namespace-title">
                    <!-- populated from the socket server -->
                </h4>
                <h6 class="pointer">
                    <i class="fa-solid fa-caret-down"></i>Rooms
                </h6>
                <ul class="room-list">
                    <!-- populated from the socket server -->
                </ul>
            </div>             
        </div>
        <div class="chat-panel col">
            <div class="room-header">
                <div class="col"><span class="curr-room-text">Chat</span> <span class="curr-room-num-users">Users <span class="fa-solid fa-user"></span></span></div>
            </div> 
            <ul id="messages">
                <!-- popolata da js -->
            </ul>
            <div class="message-form">
                <form id="message-form" id="user-input">
                    <input id="user-message" type="text" placeholder="Enter your message" />
                </form>
            </div>
        </div>
    </div>
</div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/buildMessageHtml.js"></script>
<script src="/joinRoom.js"></script>
<script src="/joinNs.js"></script>
<script src="/scripts.js"></script>
</body>
</html>
